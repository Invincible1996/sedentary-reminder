name: Build

# 触发条件:
# - 推送 v* 标签时触发构建，并自动创建 GitHub Release，附带安装包，使其在仓库首页显示最新版本
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: sedentary-reminder-macos
          - os: windows-latest
            artifact: sedentary-reminder-windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Update version from Git tag
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "Updating version to $VERSION"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            config.version = '$VERSION';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2) + '\n');
          "

      - name: Patch Tauri Config for CI Webview Fallback
        run: |
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('src-tauri/webview2_runtime')) {
              console.log('src-tauri/webview2_runtime not found. Patching tauri.conf.json to use downloadBootstrapper for CI fallback.');
              const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              if (config.bundle && config.bundle.windows) {
                config.bundle.windows.webviewInstallMode = { type: 'downloadBootstrapper' };
                fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2) + '\n');
              }
            }
          "

      - name: Build & collect bundles to outputs/
        run: bash scripts/build.sh

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: outputs/*
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## Bundles (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh outputs/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten installers
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Determine Release Tag
        id: info
        run: |
          echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "release_name=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag_name }}
          name: ${{ steps.info.outputs.release_name }}
          prerelease: false
          files: release-assets/*
          generate_release_notes: true
