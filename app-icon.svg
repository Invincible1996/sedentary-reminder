<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background to make it stand out on both light and dark systems -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="#121620" />
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.3" />
  
  <!-- Glowing circular timer -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="url(#logoGrad)" stroke-width="5.5" stroke-dasharray="160 50" stroke-linecap="round" opacity="0.85" />
  
  <!-- Stylized stretching figure -->
  <circle cx="50" cy="30" r="5.5" fill="url(#logoGrad)" filter="url(#logoGlow)" />
  <path d="M 50 36 C 50 48, 55 52, 45 68" fill="none" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" filter="url(#logoGlow)" />
  <path d="M 32 38 C 42 36, 48 38, 68 28" fill="none" stroke="url(#logoGrad)" stroke-width="4.5" stroke-linecap="round" filter="url(#logoGlow)" />
  <path d="M 50 50 C 58 56, 62 62, 60 72" fill="none" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" filter="url(#logoGlow)" />
</svg>
